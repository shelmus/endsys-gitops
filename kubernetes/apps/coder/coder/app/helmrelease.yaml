---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coder
spec:
  interval: 1h
  chart:
    spec:
      chart: coder
      version: 2.31.5
      sourceRef:
        kind: HelmRepository
        name: coder
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    coder:
      service:
        type: ClusterIP
      env:
        - name: CODER_PG_CONNECTION_URL
          valueFrom:
            secretKeyRef:
              name: coder-postgres-app
              key: uri
        - name: CODER_ACCESS_URL
          value: "https://coder.endsys.cloud"
        - name: CODER_OIDC_ISSUER_URL
          value: "https://auth.endsys.cloud"
        - name: CODER_OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: coder-oauth
              key: client-id
        - name: CODER_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: coder-oauth
              key: client-secret
        - name: CODER_OIDC_SIGN_IN_TEXT
          value: "Login with PocketID"
        - name: CODER_OIDC_SCOPES
          value: "openid,email,profile"
        - name: CODER_OAUTH2_GITHUB_DEFAULT_PROVIDER_ENABLE
          value: "false"

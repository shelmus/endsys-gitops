---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firecrawl
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: firecrawl-helm
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # Pin Firecrawl images to chart-matching 0.2.0 (only versioned tag on Docker Hub).
    # GHCR alternatives only publish :latest, which violates repo CLAUDE.md.
    image:
      tag: "0.2.0"
    playwright:
      tag: "0.2.0"
    nuqPostgres:
      image:
        tag: "0.2.0"
      persistence:
        enabled: true
        size: 10Gi

    redis:
      image: redis:7.4.9-alpine3.21
    rabbitmq:
      image: rabbitmq:3.13.7-management-alpine

    # Scrape/crawl only — disable LLM-dependent workers.
    extractWorker:
      enabled: false
    nuqPrefetchWorker:
      enabled: false

    # Enable resource requests/limits globally (uses chart's modest defaults).
    resources:
      enabled: true

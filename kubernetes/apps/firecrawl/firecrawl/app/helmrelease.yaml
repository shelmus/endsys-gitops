---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firecrawl
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: firecrawl-helm
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # winkkgmbh publishes only :latest for these images (the chart-version-named
    # :0.2.0 tag on winkkgmbh/firecrawl is the Helm chart artifact, not a runnable
    # container — it crashes with "node: not found"). Pin by SHA digest of :latest
    # at deploy time so the deployment is reproducible despite the upstream gap.
    # Refresh digests when upgrading the chart.
    image:
      tag: "latest@sha256:8b26e0967fa83e7f92d2e506e0957c10fe52f082b829e56a72ade0f7a627ed50"
    playwright:
      tag: "latest@sha256:3542c4773c7ba5072258625cf40916d6589b2d94f7f12a5ed22e670ece126ead"
    nuqPostgres:
      image:
        tag: "latest@sha256:b0f14f9c8c9b5929d25a5d6f1f7f6ef99c51475d45767908eed4f086f7159e02"
      # Persistence stays off (chart default): chart mounts the PVC directly at
      # /var/lib/postgresql/data, and initdb refuses to start with the filesystem's
      # lost+found in there. The chart has no PGDATA override. NUQ holds transient
      # queue state per the design spec, so emptyDir is acceptable.
      persistence:
        enabled: false

    redis:
      image: redis:7.4.9-alpine3.21
    rabbitmq:
      image: rabbitmq:3.13.7-management-alpine

    # Scrape/crawl only — disable LLM-dependent workers.
    extractWorker:
      enabled: false
    nuqPrefetchWorker:
      enabled: false

    # Enable resource requests/limits globally (uses chart's modest defaults).
    resources:
      enabled: true

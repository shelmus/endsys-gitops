---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
spec:
  interval: 30m
  chart:
    spec:
      chart: ./script/helm/garage
      sourceRef:
        kind: GitRepository
        name: garage
        namespace: flux-system
      interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    deployment:
      kind: StatefulSet
      replicaCount: 1
    garage:
      replicationMode: "1"
    persistence:
      enabled: true
      meta:
        storageClass: longhorn
        size: 10Gi
      data:
        storageClass: ""
        size: 1Ti
    service:
      s3:
        api:
          port: 3900
        web:
          port: 3902
    monitoring:
      tracing:
        sink: ""
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          interval: 30s

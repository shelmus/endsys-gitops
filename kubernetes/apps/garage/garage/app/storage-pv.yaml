---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: garage-data-pv
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    path: /vault/k8s
    server: 10.127.0.7
  claimRef:
    namespace: garage
    name: data-garage-0

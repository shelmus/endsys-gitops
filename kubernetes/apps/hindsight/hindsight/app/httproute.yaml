---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hindsight
  labels:
    app.kubernetes.io/name: hindsight
    app.kubernetes.io/instance: hindsight
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: hindsight
spec:
  parentRefs:
    - name: internal
      namespace: kube-system
      sectionName: https
  hostnames:
    - hindsight.endsys.cloud
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hindsight-control-plane
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hindsight-api
  labels:
    app.kubernetes.io/name: hindsight
    app.kubernetes.io/instance: hindsight
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: hindsight
spec:
  parentRefs:
    - name: internal
      namespace: kube-system
      sectionName: https
  hostnames:
    - hindsight-api.endsys.cloud
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hindsight-api
          port: 8888

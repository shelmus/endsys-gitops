---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
# Required Bitwarden secrets (create these in Bitwarden Secrets Manager):
#   - larder-secret-key: Django SECRET_KEY (generate with `openssl rand -base64 48`)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: larder-secrets
  labels:
    app.kubernetes.io/name: larder
    app.kubernetes.io/instance: larder
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: larder
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: larder-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: larder-secret-key
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
# Separate secret so the app can start password-only before the PocketID
# client exists (consumed via optional envFrom in the HelmRelease).
# Required Bitwarden secrets (from the PocketID client at auth.endsys.cloud,
# callback URL https://larder.endsys.cloud/oidc/callback/):
#   - larder-oidc-client-id
#   - larder-oidc-client-secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: larder-oidc
  labels:
    app.kubernetes.io/name: larder
    app.kubernetes.io/instance: larder
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: larder
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: larder-oidc
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: larder-oidc-client-id
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: larder-oidc-client-secret

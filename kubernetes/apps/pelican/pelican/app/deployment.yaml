---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pelican-panel
  labels:
    app.kubernetes.io/name: pelican
    app.kubernetes.io/component: panel
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app: pelican-panel
  template:
    metadata:
      labels:
        app: pelican-panel
        app.kubernetes.io/name: pelican
        app.kubernetes.io/component: panel
    spec:
      securityContext:
        runAsUser: 82
        runAsGroup: 82
        fsGroup: 82
      containers:
        - name: pelican-panel
          image: ghcr.io/pelican-dev/panel:v1.0.0-beta33
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: pelican-secrets
          env:
            - name: XDG_DATA_HOME
              value: /pelican-data
            - name: APP_URL
              value: https://pelican.endsys.cloud
            - name: ADMIN_EMAIL
              value: admin@endsys.cloud
            - name: BEHIND_PROXY
              value: "true"
            - name: TRUSTED_PROXIES
              value: "10.127.0.0/24"
          volumeMounts:
            - name: pelican-data
              mountPath: /pelican-data
            - name: pelican-logs
              mountPath: /var/www/html/storage/logs
            - name: caddy-config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: pelican-data
          persistentVolumeClaim:
            claimName: pelican-data
        - name: pelican-logs
          persistentVolumeClaim:
            claimName: pelican-logs
        - name: caddy-config
          configMap:
            name: caddy-config

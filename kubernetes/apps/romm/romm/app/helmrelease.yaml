---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: romm
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      romm:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            backup.velero.io/backup-volumes-excludes: library
        containers:
          app:
            image:
              repository: rommapp/romm
              tag: 5.0.0
            env:
              TZ: America/New_York
              ROMM_BASE_URL: https://romm.${SECRET_DOMAIN}
              ROMM_PORT: "8080"
              ROMM_DB_DRIVER: postgresql
              DB_HOST: romm-postgres-rw
              DB_PORT: "5432"
              DB_NAME: romm
              DB_USER: romm
              DB_PASSWD:
                valueFrom:
                  secretKeyRef:
                    name: romm-postgres-app
                    key: password
              REDIS_HOST: dragonfly
              REDIS_PORT: "6379"
              HASHEOUS_API_ENABLED: "true"
              SCAN_WORKERS: "2"
              WEB_SERVER_CONCURRENCY: "2"
              ROMM_TMP_PATH: /romm/tmp
              ROMM_AUTH_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: romm-secrets
                    key: ROMM_AUTH_SECRET_KEY
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/heartbeat
                    port: &port 8080
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/heartbeat
                    port: *port
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/heartbeat
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 4Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: romm
        ports:
          http:
            port: *port

    persistence:
      library:
        type: persistentVolumeClaim
        existingClaim: romm-library
        globalMounts:
          - path: /romm/library
      resources:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 20Gi
        retain: true
        globalMounts:
          - path: /romm/resources
      assets:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        retain: true
        globalMounts:
          - path: /romm/assets
      config:
        type: configMap
        name: romm-config
        globalMounts:
          - path: /romm/config/config.yml
            subPath: config.yml
            readOnly: true
      tmp:
        type: emptyDir
        sizeLimit: 5Gi
        globalMounts:
          - path: /romm/tmp

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
spec:
  interval: 30m
  chart:
    spec:
      chart: velero
      version: 12.0.0
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
      interval: 5m
  dependsOn:
    - name: garage
      namespace: garage
  values:
    # Use Kopia (replaces Restic) for file-system backup
    deployRestic: true
    # We are not using cloud provider snapshots
    snapshotsEnabled: false
    # Reference the 'cloud' key from the secret in step 02
    credentials:
      secretName: velero-s3-credentials
      secretKey: cloud
    configuration:
      provider: aws
      backupStorageLocation:
        name: default
        bucket: velero
        config:
          region: garage
          s3ForcePathStyle: "true"
          s3Url: http://garage.garage.svc:3900
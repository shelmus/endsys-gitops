---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
spec:
  interval: 30m
  chart:
    spec:
      chart: velero
      version: 12.0.1
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
      interval: 5m
  dependsOn:
    - name: garage
      namespace: garage
  values:
    # Use Kopia (replaces Restic) for file-system backup
    deployNodeAgent: true
    # We are not using cloud provider snapshots
    snapshotsEnabled: false
    # Reference the 'cloud' key from the secret in step 02
    credentials:
      secretName: velero-s3-credentials
      secretKey: cloud
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.13.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins
    configuration:
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: velero
          credential:
            name: velero-s3-credentials
            key: cloud
          config:
            region: garage
            s3ForcePathStyle: "true"
            s3Url: http://garage.garage.svc:3900
            profile: default